{% extends "base.html" %}

{% block title %}404 | Link Not Found{% endblock %}

{% block content %}

<div class="error-container">

    <div class="error-card">
        <h1>404</h1>
        <h2>Short URL Not Found</h2>

        <p>
            The link you are looking for does not exist,
            may have expired, or was removed.
        </p>

        <a href="{{ url_for('home') }}" class="error-button">
            Return Home
        </a>

        <a href="{{ url_for('shorten') }}" class="error-button secondary">
            Create New Link
        </a>
    </div>

</div>

{% endblock %}
