<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NitTheNat | Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --twitch-purple: #9146FF;
            --twitch-dark: #18181b;
            --bg-gray: #323233;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-gray);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .profile-card {
            background: rgb(41, 40, 40);
            width: 90%;
            max-width: 450px;
            border-radius: 16px;
            border: 2px solid var(--twitch-purple);
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            padding-bottom: 30px;
        }

        .header-banner {
            background-color: var(--twitch-purple);
            padding: 30px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            color: white;
        }

        .profile-pic {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            border: 3px solid white;
            background: #222; /* Placeholder color */
        }

        .header-text h1 {
            margin: 0;
            font-size: 1.8rem;
            text-align: left;
        }

        .header-text p {
            margin: 0;
            opacity: 0.9;
            font-size: 1rem;
            text-align: left;
        }

        .tag-container {
            padding: 20px 20px 10px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        .tag {
            background: #f0e6ff;
            color: var(--twitch-purple);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid var(--twitch-purple);
        }

        .bio {
            padding: 0 30px;
            color: #8606ff;
            font-weight: bold;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .social-links {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-icon {
            width: 45px;
            height: 45px;
            background: var(--twitch-purple);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .social-icon:hover {
            transform: translateY(-3px);
            background: #772ce8;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="header-banner">
            <img src="https://static-cdn.jtvnw.net/jtv_user_pictures/55d25e67-8952-4674-8a9b-778895aa2d04-profile_image-70x70.png" alt="NiTTHeNat" class="profile-pic">
            <div class="header-text">
                <h1>Nathaniel</h1>
                <p>@NitTheNat</p>
            </div>
        </div>

        <div class="tag-container">
            <span class="tag">AL Staff</span>
            <span class="tag">ARC Team Member</span>
            <span class="tag">TM Team Member</span>
            <span class="tag">Speedrunner</span>
            <span class="tag">Streamer</span>
        </div>

        <div class="bio">
            <p>Funny goofy streamer, whos chair has wheels. Heavily involved in the competetive mario kart scheme.</p>
        </div>

        <div class="social-links">
            <a href="https://twitch.tv/nitthenat" class="social-icon"><i class="fab fa-twitch"></i></a>
            <a href="https://x.com/nitthenat_" class="social-icon"><i class="fab fa-twitter"></i></a>
            <a href="https://discord.nitthenat.com" class="social-icon"><i class="fab fa-discord"></i></a>
        </div>
    </div>

</body>
</html>
