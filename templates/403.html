{% extends "base.html" %}

{% block title %}403 | Service unavailable{% endblock %}

{% block content %}

<div class="error-container">

    <div class="error-card">
        <h1>403</h1>
        <h2>Service down!</h2>

            We are currently experiencing some issues with this request, please try again later.
        </p>

        <a href="{{ url_for('home') }}" class="error-button">
            Return Home
        </a>
    </div>

</div>

{% endblock %}
